<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">🏪</div>
      <h1>Create Account</h1>
      <p>Join the Store Management System</p>
    </div>

    @if (errorMessage()) {
      <div class="error-banner">{{ errorMessage() }}</div>
    }

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" [(ngModel)]="registerForm.fullName" placeholder="Enter your full name" />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="registerForm.email" placeholder="Enter your email" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input
        type="password"
        [(ngModel)]="registerForm.password"
        placeholder="At least 6 characters"
      />
    </div>

    <div class="form-group">
      <label>Role</label>
      <select [(ngModel)]="registerForm.role">
        <option value="Customer">Customer</option>
        <option value="Admin">Admin</option>
      </select>
    </div>

    <button class="btn-submit" (click)="submit()" [disabled]="isLoading()">
      {{ isLoading() ? 'Creating account...' : 'Create Account' }}
    </button>

    <p class="auth-footer">
      Already have an account?
      <a routerLink="/login">Sign in</a>
    </p>
  </div>
</div>
