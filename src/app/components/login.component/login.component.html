<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">🏪</div>
      <h1>Welcome Back</h1>
      <p>Sign in to your account</p>
    </div>

    @if (errorMessage()) {
      <div class="error-banner">{{ errorMessage() }}</div>
    }

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="loginForm.email" placeholder="Enter your email" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="loginForm.password" placeholder="Enter your password" />
    </div>

    <button class="btn-submit" (click)="submit()" [disabled]="isLoading()">
      {{ isLoading() ? 'Signing in...' : 'Sign In' }}
    </button>

    <p class="auth-footer">
      Don't have an account?
      <a routerLink="/register">Create one</a>
    </p>
  </div>
</div>
